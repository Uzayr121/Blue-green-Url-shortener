    blue-green-deploy:
        name: Blue Green Deploy
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: configure aws credentials
              uses: aws-actions/configure-aws-credentials@v2
              with: 
                  role-to-assume: ${{ secrets.CODE_DEPLOY_ARN }}
                  aws-region: eu-west-2

            - name: testing aws cli
              run: aws sts get-caller-identity

            - name: Task definition download
              id: download-task-def
              env:
                ecs_task_def_name: example_codedeploy_ecs_task_def
              run: |
                aws ecs describe-task-definition --task-definition "blue-green-task" --query taskDefinition > task-definition.json

            - name: Fill in the new image ID in the Amazon ECS task definition
              id: update-task-def-image
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                task-definition: task-definition.json
                container-name: container_name
                image:  ${{ secrets.ECR_REPOSITORY }}:latest

            - name: Set appspec.json values
              id: set-appspec-values
              env:
                cluster: blue-green-cluster
                service: blue-green-app
                codedeploy-application: ecs_codedeploy_app
                codedeploy-deployment-group: blue-green-deployment-group
                container_name: app
              run: |
                export TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition="blue-green-task" | jq '.taskDefinition.taskDefinitionArn')
                cat ./.github/workflows/appspec.json | jq --arg key "$TASK_DEF_ARN" '.Resources[].TargetService.Properties.TaskDefinition=$key'> .aws/appspec.json
                sed -i 's#\\"##g' .aws/appspec.json

                
            - name: ECS task deployment using CodeDeploy
              uses: aws-actions/amazon-ecs-deploy-task-definition@v1
              env:
                ACTIONS_STEP_DEBUG: true #enable step debug logging
              with:
                task-definition: 
                service: blue-green-app
                cluster: blue-green-cluster
                wait-for-service-stability: true
                codedeploy-appspec: .aws/appspec.json
                codedeploy-application: ecs_codedeploy_app
                codedeploy-deployment-group: blue-green-deployment-group
