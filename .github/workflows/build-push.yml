name: Build and Push Docker Image to ECR
on: 

    workflow_dispatch:
        inputs: 
            confirmation:
                description: 'type yes to confirm'
                required: true
                default: 'no'
                
permissions:
  id-token: write   # Allows requesting an OIDC token
  contents: read	# Required for actions/checkout
                
  
jobs:
  build:
   
  
    name: login to AWS
    runs-on: ubuntu-latest  
    steps:  
        - name: Checkout code
          uses: actions/checkout@v2  
        
          
        - name: Abort if Not Confirmed
          if: ${{ github.event.inputs.confirmation != 'yes' }}  # exits for any input other than 'yes'
          
          run: |
            echo "Workflow is aborted because you did not say 'yes'."
            exit 1 # Exit with a non-zero status to fail the job

        - name: configure aws credentials
          uses: aws-actions/configure-aws-credentials@v2
          with: 
            role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
            aws-region: eu-west-2

        - name: Login to Amazon ECR
          id: login-pf-aws-ecr
          uses: aws-actions/amazon-ecr-login@v1
          
        - name: Build image
          env: 
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
            IMAGE_TAG: latest
          run: |
            docker build -t $ECR_REPOSITORY:$IMAGE_TAG .


        - name: scanning image
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: ${{ secrets.ECR_REPOSITORY }}:latest
            format: 'table'
            exit-code: '1'
            severity: 'CRITICAL, HIGH'
            ignore-unfixed: true

        - name: Push image to Amazon ECR
          env: 
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
            IMAGE_TAG: latest
          run: |
            docker push $ECR_REPOSITORY:$IMAGE_TAG

          


            